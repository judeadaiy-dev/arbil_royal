name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Inject Global Gradle Shield (حل مشكلة الحزم والمكتبات)
        run: |
          # إنشاء ملف إعدادات خفي يجبر أي مكتبة معطوبة على القبول بالإصدارات الصحيحة
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              ext {
                  flutter = [
                      compileSdkVersion: 34,
                      targetSdkVersion: 34,
                      minSdkVersion: 21,
                      compileSdk: 34,
                      targetSdk: 34,
                      minSdk: 21
                  ]
              }
              rootProject.ext {
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  minSdkVersion = 21
                  flutter = [
                      compileSdkVersion: 34,
                      targetSdkVersion: 34,
                      minSdkVersion: 21,
                      compileSdk: 34,
                      targetSdk: 34,
                      minSdk: 21
                  ]
              }
              
              afterEvaluate { project ->
                  if (project.extensions.findByName('android') != null) {
                      def androidObj = project.extensions.getByName('android')
                      try {
                          androidObj.compileSdkVersion = 34
                      } catch (Exception e) {
                          try { androidObj.compileSdk = 34 } catch (Exception ex) {}
                      }
                      try {
                          androidObj.defaultConfig.minSdkVersion = 21
                      } catch (Exception e) {
                          try { androidObj.defaultConfig.minSdk = 21 } catch (Exception ex) {}
                      }
                      try {
                          androidObj.defaultConfig.targetSdkVersion = 34
                      } catch (Exception e) {
                          try { androidObj.defaultConfig.targetSdk = 34 } catch (Exception ex) {}
                      }
                  }
              }
          }
          EOF
          echo "Global Gradle Shield Activated."

      - name: Force Clean Android Structure
        run: |
          # تصفير المجلد لإنشاء بيئة معزولة
          rm -rf android
          flutter create . --platforms=android --template=app
          
          # إدخال القيم لملف الخصائص احتياطاً
          cat <<EOF > android/gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # تصريح الإنترنت للموبايل
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Mobile-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
