name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف
          flutter clean
          
          # 2. إنشاء الهيكلية
          flutter create .
          
          # 3. إنشاء ملف local.properties (هذا هو الحل الجذري)
          # نكتب المسارات يدوياً لضمان أن مكتبة app_links ستجد تعريفات flutter
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # 4. حقن تعريفات الـ ext في ملف android/build.gradle
          # نستخدم استبدال ذكي بدلاً من الإضافة للسطر الأول
          sed -i "1i ext { flutter = [compileSdkVersion: 34, minSdkVersion: 21, targetSdkVersion: 34] }" android/build.gradle
          
          # 5. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
