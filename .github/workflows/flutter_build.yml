name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. الإنشاء الذكي: لا تنشئ إلا إذا كان المجلد غير موجود (مرة واحدة فقط)
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
            
            # 2. الحقن لمرة واحدة (يتم تنفيذه فقط عند إنشاء المجلد لأول مرة)
            # الحقن في ملف البناء الرئيسي
            sed -i '1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }' android/build.gradle
            
            # الحقن في ملف بناء التطبيق
            sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
            
            # ضبط Gradle Wrapper
            sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
            
            # ضبط الإعدادات
            echo "android.useAndroidX=true" > android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          # 3. البناء النهائي (الآن الإعدادات ثابتة ومحقونة)
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
