name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Force Rebuild Android Structure
        run: |
          # 1. إزالة أي هيكلية أندرويد قديمة تسبب التعارض
          rm -rf android
          
          # 2. إنشاء هيكلية أندرويد جديدة ومتوافقة
          flutter create . --platforms=android
          
          # 3. جلب التبعيات
          flutter pub get
          
          # 4. الحقن المدرع (بدون هذا سيفشل البناء)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 5. البناء النهائي
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
