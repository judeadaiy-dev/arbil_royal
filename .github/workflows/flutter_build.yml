name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.0', channel: 'stable' }
      
      - name: Build & Compile
        run: |
          flutter pub get
          # 1. إنشاء هيكلية الأندرويد لضمان مكان الحقن
          flutter create .
          
          # 2. حقن إعدادات الكوتلن (إجباري)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          
          # 3. حقن متطلبات الـ App Links والـ SDK (إجباري)
          # هذه الأوامر تضمن أن الـ Manifest والـ Gradle سيقبلون الروابط
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle
          
          # إضافة إعدادات الـ AndroidX والـ Jetifier لضمان عمل المكتبات
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. البناء النهائي مع تجنب الـ tree-shake-icons لضمان عدم ضياع الأصول
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
