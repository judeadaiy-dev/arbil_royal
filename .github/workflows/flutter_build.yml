name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          flutter create .
          
          # حقن إعدادات الـ Flutter التي تبحث عنها مكتبة app_links
          # نضعها في ملف gradle.properties ليراها Gradle في أي مشروع فرعي
          echo "flutter.compileSdkVersion=34" >> android/gradle.properties
          echo "flutter.minSdkVersion=21" >> android/gradle.properties
          echo "flutter.targetSdkVersion=34" >> android/gradle.properties
          
          # إضافة تعريف خاص للمكتبة لتتوقف عن الشكوى
          echo "ext { flutter = [compileSdkVersion: 34, minSdkVersion: 21, targetSdkVersion: 34] }" >> android/build.gradle
          
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
