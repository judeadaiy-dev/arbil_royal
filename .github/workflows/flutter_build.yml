name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          
          # إنشاء المشروع
          flutter create . --platforms android
          
          # 1. تحديث المكتبات إلى آخر إصدار لتجاوز الـ Bug
          flutter pub upgrade --major-versions
          
          # 2. حقن إعدادات التوافق في ملفات الـ Gradle التي تم إنشاؤها
          # هذا السطر يضمن أن كل المكاتب (بما فيها app_links) ترى الـ Flutter SDK
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > android/gradle.properties
          
          # 3. إجبار المكتبات على قراءة الـ SDK الصحيح
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

          # 4. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
