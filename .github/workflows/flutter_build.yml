name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          # 1. دع السيرفر ينشئ المجلدات بنفسه
          flutter pub get
          flutter create .
          
          # 2. الآن نعدل على ما أنشأه السيرفر فوراً
          # نرفع إصدار كوتلن إلى 1.9.22 ليتوافق مع مكتباتك الحديثة
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          
          # 3. نحدث الـ Gradle Wrapper ليكون متوافقاً مع هذا الإصدار
          sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
