name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء المشروع في مجلد مؤقت فقط إذا لم نكن قد أنشأناه من قبل
          if [ ! -d "android" ]; then
            mkdir -p temp_android
            cd temp_android
            flutter create . --platforms=android
            cd ..
            mv temp_android/android .
            rm -rf temp_android
          fi
          
          # 2. حقن الإعدادات الضرورية داخل ملفات المشروع (تعديل مباشر)
          # إضافة الـ compileSdkVersion لملف التطبيق لإنهاء خطأ app_links
          sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          
          # ضبط ملف build.gradle الرئيسي ليتعرف على إعدادات flutter
          sed -i '1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }' android/build.gradle
          
          # 3. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
