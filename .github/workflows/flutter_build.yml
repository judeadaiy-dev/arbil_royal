name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          # إنشاء المشروع لضمان وجود الهيكلية المطلوبة
          flutter create .
          
          # 1. تحديث نسخة Gradle لضمان استقرار البناء
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 2. حقن الـ ext الأساسي الذي تحتاجه كل المكتبات (الحل التقني الجذري)
          # نضعه في أعلى ملف android/build.gradle ليتم اعتماده كمرجع ثابت
          sed -i "1i buildscript { ext { kotlin_version = '1.9.22'; flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }" android/build.gradle
          
          # 3. توحيد إعدادات الأندرويد في gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          
          # 4. بناء الـ APK (التطبيق سيستخدم الأيقونات الموجودة في مجلد المشروع تلقائياً)
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
