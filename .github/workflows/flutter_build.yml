name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء المجلد تلقائياً إذا لم يكن موجوداً
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi
          
          # 2. حقن الإعدادات الصارمة لضمان التوافقية
          # تحديث نسخة Kotlin في settings.gradle
          if [ -f "android/settings.gradle" ]; then
             sed -i 's|org.jetbrains.kotlin.android version.*|org.jetbrains.kotlin.android version "1.9.0" apply false|g' android/settings.gradle
          fi

          # إعداد الـ compileSdkVersion لإنهاء خطأ app_links
          if [ -f "android/app/build.gradle" ]; then
             grep -q "compileSdkVersion 34" android/app/build.gradle || sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          fi
          
          # ضبط Gradle Wrapper
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # إعداد الخصائص
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 3. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
