name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Disable Analytics
        run: flutter config --no-analytics
        
      - name: Create Flutter Project Structure
        run: |
          # اذا مجلد android ناقص، flutter create يصلحه
          if [ ! -f "android/app/build.gradle" ]; then
            flutter create --platforms=android --project-name seachat .
          fi
          
      - name: Auto-Fix Android Build Issues
        run: |
          # 1. تنظيف القيم القديمة التي قد تسبب تعارضاً
          sed -i '/compileSdkVersion/d' android/app/build.gradle
          sed -i '/minSdkVersion/d' android/app/build.gradle
          sed -i '/targetSdkVersion/d' android/app/build.gradle

          # 2. حقن القيم مباشرة داخل defaultConfig لضمان تعرف Gradle عليها
          # نبحث عن السطر الخاص بـ defaultConfig ونضيف القيم بعده
          sed -i '/defaultConfig {/a \
              applicationId "com.example.seachat"\
              minSdkVersion 21\
              targetSdkVersion 34\
              compileSdkVersion 34' android/app/build.gradle

          # 3. إزالة التعارض مع متغيرات flutter إذا كانت موجودة
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          
          # 4. الغاء minify لضمان عدم فشل البناء
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle
          
          # 5. حقن تصريح الانترنت
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          
          echo "All Android fixes applied correctly"

          
      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
