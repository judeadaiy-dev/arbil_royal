name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف عميق
          flutter clean
          
          # 2. تحديث الحزم وإجبارها على استخدام أحدث إصدار من app_links
          # هذا السطر يقرأ pubspec.yaml ويحدث المكتبات لأقصى حد مسموح به
          flutter pub upgrade --major-versions
          
          # 3. إنشاء المشروع (بما أنك تعمل من الهاتف، نحتاج هذه الخطوة)
          flutter create .
          
          # 4. إجبار المكتبة على التوافق مع بنية الـ Gradle الحديثة
          # سنقوم بحقن إعدادات التوافق مباشرة في ملف البناء
          echo "android {
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }" >> android/app/build.gradle
          
          # 5. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
