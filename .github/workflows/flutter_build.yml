name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Disable Analytics
        run: flutter config --no-analytics
        
      - name: Create Flutter Project Structure
        run: |
          # اذا مجلد android ناقص، flutter create يصلحه
          if [ ! -f "android/app/build.gradle" ]; then
            flutter create --platforms=android --project-name seachat .
          fi
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Auto-Fix Android Build Issues
        run: |
          # 1. تعديل build.gradle تلقائياً
          sed -i 's/compileSdkVersion.*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion.*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion.*/minSdkVersion 21/' android/app/build.gradle
          
          # 2. الغاء minify عشان ما يطيح البناء
          sed -i 's/minifyEnabled true/minifyEnabled false/' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/' android/app/build.gradle
          
          # 3. حقن تصريح الانترنت
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          
          # 4. حل مشكلة App Links
          if ! grep -q "android:autoVerify" "$MANIFEST"; then
            sed -i 's/<intent-filter>/<intent-filter android:autoVerify="false">/' "$MANIFEST"
          fi
          
          echo "All Android fixes applied"
          
      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
