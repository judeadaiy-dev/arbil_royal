name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # نستخدم إصدار أحدث لتجاوز خطأ الإصدار الأول
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          
          # إنشاء المشروع بدون تعقيدات (الأمر `--androidx` لم يعد موجوداً)
          flutter create . --platforms android
          
          # تحديث المكتبات
          flutter pub get
          
          # البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
