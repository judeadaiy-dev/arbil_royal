name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. إنشاء المشروع
          flutter create . --platforms android
          
          # 2. خطوة الإنقاذ: حذف المكتبة التي تسبب الانهيار من الـ Gradle الخاص بها
          # هذه الخطوة تمنع الـ Gradle من محاولة قراءة إعدادات مفقودة في app_links
          rm -rf /home/runner/.pub-cache/hosted/pub.dev/app_links-6.4.1/android/build.gradle
          
          # 3. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
