name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Build Android
        run: |
          # 1. إعداد المشروع
          flutter pub get
          
          # 2. إنشاء هيكلية الأندرويد (فقط إذا لم تكن موجودة)
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi
          
          # 3. إعداد خصائص الـ Gradle (نضع التعريفات في ملف properties ليراها أي build.gradle)
          cat <<EOF > android/local.properties
          sdk.dir=$ANDROID_HOME
          flutter.sdk=$FLUTTER_ROOT
          flutter.buildMode=release
          flutter.versionName=1.0.0
          flutter.versionCode=1
          EOF
          
          # 4. الحقن المباشر في ملف الإعدادات الرئيسي للـ Gradle (يحل مشكلة app_links)
          # سنضيف كود التعريف في بداية ملف settings.gradle ليكون متاحاً لكل المشروع
          sed -i "1i include ':app'\n\next.flutter_compileSdkVersion = 34\next.flutter_minSdkVersion = 21\next.flutter_targetSdkVersion = 34\n" android/settings.gradle
          
          # 5. التعديل النهائي لملف الـ build.gradle لضمان التوافق
          sed -i "s/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g" android/app/build.gradle
          sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g" android/app/build.gradle
          
          # 6. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
