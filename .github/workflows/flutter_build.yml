name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # استخدم إصداراً أحدث يتوافق مع >=3.5.0
          flutter-version: '3.24.0' 
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف شامل
          flutter clean
          
          # 2. تحميل المكتبات
          flutter pub get
          
          # 3. بناء الأصول (تأكد أن مجلد assets موجود)
          flutter pub run build_runner build --delete-conflicting-outputs || echo "No build_runner needed"
          
          # 4. البناء النهائي (بدون تعقيدات الخرائط السابقة)
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
