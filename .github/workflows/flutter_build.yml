name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء المشروع (إذا لم يكن موجوداً)
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi
          
          # 2. "التصحيح الجراحي" لملفات Gradle
          # تحديث نسخة Kotlin في ملف settings.gradle ليتوافق مع المكتبات الجديدة
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "1.9.0" apply false/g' android/settings.gradle
          
          # تحديث نسخة Kotlin في ملف build.gradle الرئيسي
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/g' android/build.gradle
          
          # إجبار compileSdkVersion على 34 في ملف التطبيق
          sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          
          # 3. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
