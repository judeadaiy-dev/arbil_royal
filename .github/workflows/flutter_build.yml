name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          flutter create .
          
          # 1. تحديث نسخة Kotlin و Gradle Wrapper (التوافق الحديث)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 2. حقن إعدادات التوافق (لإنهاء مشاكل app_links ومكتبات التبعية)
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "flutter.compileSdkVersion=34" >> android/gradle.properties
          
          # 3. الحقن المباشر في build.gradle (لضمان تعريف الـ ext flutter الذي تطلبه المكتبات)
          # نستخدم sed لإضافة الـ ext قبل أي شيء آخر في الملف
          sed -i "1i ext { flutter = [compileSdkVersion: 34, minSdkVersion: 21, targetSdkVersion: 34] }" android/build.gradle
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
