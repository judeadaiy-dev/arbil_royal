name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف الـ Cache
          rm -rf /home/runner/.pub-cache/hosted/pub.dev/app_links*
          flutter clean
          
          # 2. إنشاء المشروع
          flutter create .
          
          # 3. إجبار المكتبات على التوافق (هذا الحل يمنع تعارض أي مكتبة تطلب app_links)
          echo "configurations.all { resolutionStrategy { force 'io.flutter:flutter_embedding_debug:1.0.0-f844dc9213' } }" >> android/app/build.gradle
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
