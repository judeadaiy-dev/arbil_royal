name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Build and Patch
        run: |
          # 1. إعداد المشروع
          flutter clean
          flutter pub get
          
          # 2. إنشاء مجلد الأندرويد إذا لم يكن موجوداً
          flutter create . --platforms=android
          
          # 3. إعداد تعريفات Flutter المطلوبة للمكتبات (هذا هو الحل الجذري)
          # سنقوم بإنشاء ملف gradle.properties مخصص يحتوي على تعريفات SDK
          echo "flutter.compileSdkVersion=34" >> android/gradle.properties
          echo "flutter.minSdkVersion=21" >> android/gradle.properties
          echo "flutter.targetSdkVersion=34" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. حقن تعريفات الـ ext في ملف build.gradle الرئيسي لضمان رؤية المكتبات لها
          sed -i "1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }" android/build.gradle
          
          # 5. تعديل ملف الـ build.gradle الخاص بالتطبيق ليربط التعريفات بشكل صحيح
          sed -i "s/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g" android/app/build.gradle
          sed -i "s/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g" android/app/build.gradle
          
          # 6. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
