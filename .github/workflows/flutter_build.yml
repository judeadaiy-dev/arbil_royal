name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          # 1. إنشاء المشروع الأساسي
          flutter create . --platforms=android
          
          # 2. حقن التصاريح (الإنترنت والشبكة) مباشرة في ملف الـ Manifest
          # نستخدم sed للبحث عن وسم <manifest> وإضافة التصاريح بعده
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml
          
          # 3. تثبيت إعدادات التوافق (Jetifier) لتجاوز أخطاء المكتبات
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. بناء الـ APK بفرض الخيار --no-shrink لتقليل تعقيدات البناء
          flutter build apk --release --no-tree-shake-icons --no-shrink
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
