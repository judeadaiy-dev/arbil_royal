name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          flutter pub get
          # إنشاء المشروع بدون تكرار إذا كان موجوداً
          if [ ! -d "android" ]; then flutter create .; fi
          
          # 1. تحديث نسخة Kotlin في ملف الإعدادات الرئيسي ليكون متوافقاً مع كل المكتبات
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          
          # 2. التأكد من استخدام AndroidX
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 3. الحقن الجذري لتعريفات SDK المطلوبة لتجاوز أخطاء المكتبات
          # نقوم بإضافة التعريفات في ملف gradle.properties الذي يراه Gradle دائماً
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "flutter.compileSdkVersion=34" >> android/gradle.properties
          echo "flutter.minSdkVersion=21" >> android/gradle.properties
          echo "flutter.targetSdkVersion=34" >> android/gradle.properties

          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
