name: Build Flutter APK

on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter clean
          flutter pub get
          
          # تحديث إعدادات الأندرويد في ملف الـ gradle.properties لضمان التوافق
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # استخدام إصدار 35 للـ compileSdk ليتوافق مع المكتبات الحديثة
          # نقوم بتعديل الملف مباشرة عبر السطر التالي:
          sed -i 's/compileSdk = .*/compileSdk = 35/g' android/app/build.gradle || echo "compileSdk already set"
          
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
