name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Let Flutter Generate Pristine Android Structure
        run: |
          # 1. مسح مجلد الأندرويد القديم والمكسور نهائياً من المستودع
          rm -rf android
          
          # 2. فلاتر نفسه يقوم بإنشاء بنية الأندرويد الرسمية والنظيفة المتوافقة مع إصداره الحالي
          flutter create . --platforms=android --template=app

      - name: Standard Gradle Configuration for Legacy Plugins
        run: |
          # حقن إعدادات الأندرويد القياسية (الهيكلية) داخل ملف build.gradle الرئيسي
          # هذه هي الطريقة الرسمية في Gradle لتمرير المتغيرات للمكتبات الخارجية (مثل app_links) بسلام
          cat << 'EOF' >> android/build.gradle

          // توفير كائن فلاتر الافتراضي للمكتبات التي تبحث عنه
          rootProject.ext {
              flutter = [
                  compileSdkVersion: 34,
                  targetSdkVersion: 34,
                  minSdkVersion: 21
              ]
          }

          // إجبار جميع الحزم والمشاريع الفرعية على استخدام نسخ مستقرة من الـ SDK
          subprojects {
              afterEvaluate { project ->
                  if (project.extensions.findByName('android') != null) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig {
                              minSdkVersion 21
                              targetSdkVersion 34
                          }
                      }
                  }
              }
          }
          EOF

      - name: Add Internet Permission to Manifest
        run: |
          # إضافة صلاحية الإنترنت الافتراضية داخل ملف الـ Manifest لضمان عمل خرائط قوقل وسوبابيس عند تشغيل الـ APK
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK Cleanly
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Mobile-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
