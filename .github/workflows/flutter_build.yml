name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف
          flutter clean
          
          # 2. إنشاء الهيكلية مع تحديد التوافق
          flutter create . --platforms android
          
          # 3. خطوة إصلاح Gradle السحرية:
          # هذا السطر يضمن أن إعدادات الـ Flutter معرفة بشكل صحيح لكل المكتبات
          echo "flutter.sdk=$(flutter --version --machine | grep -oP '(?<=\"flutterRoot\":\")[^\"]*')" >> android/local.properties
          
          # 4. تحميل المكتبات
          flutter pub get
          
          # 5. البناء النهائي
          flutter build apk --release --no-tree-shake-icons

          
          # 3. إجبار بناء الـ APK بـ Gradle حديث
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
