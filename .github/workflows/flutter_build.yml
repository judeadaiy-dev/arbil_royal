name: Build Flutter APK

on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. جلب المكتبات
          flutter pub get
          
          # 2. بناء الأندرويد (بدون flutter create، دعه يقوم بذلك تلقائياً)
          # سنقوم بتنفيذ الأمر build مباشرة، فإذا لم يجد مجلد أندرويد، سيقوم هو بإنشائه بشكل صحيح
          flutter build apk --release --no-tree-shake-icons
          
          # 3. إذا فشل البناء أعلاه بسبب نسخة الكوتلن، فهذا يعني أننا نحتاج لـ Patching
          # بما أننا لا نريد تكرار الخطأ، ارفع هذا الكود أولاً، إذا فشل، 
          # سيعطينا السيرفر رسالة خطأ "حقيقية" وليس خطأ "Unsupported project"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
