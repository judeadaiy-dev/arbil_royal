name: Build Flutter APK

on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Inject Requirements
        run: |
          flutter pub get
          
          # 1. حقن إصدار الكوتلن (حل مشكلة Incompatible Kotlin)
          # نبحث عن السطر ونستبدله لضمان توافق المكتبات
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          fi
          
          # 2. حقن إعدادات التوافق (App Links تتطلب AndroidX و Jetifier)
          if [ -f android/gradle.properties ]; then
            echo "android.useAndroidX=true" >> android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi
          
          # 3. البناء المباشر
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
