name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Build Android
        run: |
          # 1. إعداد المشروع الأساسي
          flutter pub get
          
          # 2. إنشاء ملف إعدادات التوافق (هذا يحل مشكلة app_links جذرياً)
          # نقوم بإنشاء ملف يقرؤه Gradle ويأخذ منه تعريفات الـ SDK
          echo "ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; }" > android/gradle_config.gradle
          
          # 3. ربط ملف الإعدادات بالـ build.gradle الرئيسي
          # إضافة سطر واحد فقط في بداية ملف build.gradle
          sed -i '1i apply from: "gradle_config.gradle"' android/build.gradle
          
          # 4. إجبار المكتبات على استخدام هذه التعريفات
          # التعديل على مستوى التطبيق
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion ext.flutter_compileSdkVersion/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion ext.flutter_minSdkVersion/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion ext.flutter_targetSdkVersion/g' android/app/build.gradle
          
          # 5. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
