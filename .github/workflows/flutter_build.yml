name: Build Flutter APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Setup Android project
        run: |
          # ننشئ المجلد فقط إذا لم يكن موجوداً
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name=arbil_royal
          fi
      
      - name: Build Flutter APK
        run: |
          # البناء مباشرة وتخطي فحص الأيقونات لتفادي أخطاء الـ Resource
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons -v
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/*.apk
