name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف شامل
          flutter clean
          
          # 2. إجبار إنشاء ملفات الأندرويد لضمان التطابق
          # استبدل com.arbilroyal بـ Package Name الخاص بتطبيقك
          flutter create --platforms android --org com.arbilroyal .
          
          # 3. تحميل المكتبات
          flutter pub get
          
          # 4. توليد الأيقونات (بما أننا أنشأنا المجلد، ستعمل الآن)
          dart run flutter_launcher_icons
          
          # 5. البناء النهائي
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk

