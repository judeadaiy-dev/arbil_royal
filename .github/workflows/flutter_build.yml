name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Force Clean & Configure Android Perfectly
        run: |
          # 1. تصفير مجلد الأندرويد لإنهاء أي تضارب قديم
          rm -rf android
          
          # 2. إعادة إنشاء قالب الأندرويد ليقرأ اسم المشروع تلقائياً من pubspec.yaml
          flutter create . --platforms=android --template=app
          
          # 3. تغذية ملف local.properties بمسار SDK الصارم وقيم الـ SDK المطلوبة للحزم
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 4. إدخال قيم التوافقية لملف gradle.properties لضمان عدم اعتراض المكتبات
          cat <<EOF >> android/gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          flutter.compileSdkVersion=34
          flutter.targetSdkVersion=34
          flutter.minSdkVersion=21
          EOF

          # 5. حقن قيم الـ SDK بداخل الـ ext العام لـ build.gradle لحل مشكلة الحزم القديمة دون تضارب مع إضافة فلاتر
          cat <<EOF >> android/build.gradle
          allprojects {
              rootProject.ext {
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  minSdkVersion = 21
              }
          }
          EOF

          # 6. إضافة تصاريح الإنترنت والشبكة لملف الـ Manifest
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi

          echo "Android environment successfully configured without conflicts."

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Mobile-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

