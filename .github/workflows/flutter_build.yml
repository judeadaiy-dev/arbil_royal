name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          
          # 1. إنشاء المشروع
          flutter create . --platforms android
          
          # 2. حقن إعدادات app_links المطلوبة في ملف build.gradle
          # هذا السطر يضيف تعريف الـ compileSdkVersion الذي تطلبه المكتبة
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          
          # 3. التأكد من توفر المجلدات (إصلاح مسار android/build.gradle)
          echo "buildscript { ext.kotlin_version = '1.9.0' }" > android/build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> android/build.gradle
          
          # 4. تحميل المكتبات والبناء
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
