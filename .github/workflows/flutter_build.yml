name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. إنشاء المشروع
          flutter create .
          
          # 2. الحل السحري: ربط المكتبة المتمردة بالمشروع الرئيسي
          # هذا السطر يجبر Gradle على انتظار انتهاء بناء المشروع الرئيسي قبل محاولة بناء المكتبة
          echo "includeBuild('.')" >> android/settings.gradle
          
          # 3. إجبار الـ Gradle على استخدام AndroidX
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
