name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء مشروع أندرويد في مجلد مؤقت (للحصول على الهيكلية السليمة)
          mkdir -p temp_setup
          cd temp_setup
          flutter create . --platforms=android
          cd ..
          
          # 2. نقل مجلد الأندرويد للمشروع الأساسي
          rm -rf android
          mv temp_setup/android .
          
          # 3. تحديث نسخة Kotlin (الحل الصارم للمشكلة الظاهرة في الصورة 1000075555.png)
          # نقوم بتحديث الـ plugin ليتوافق مع الإصدارات الحديثة
          sed -i 's|org.jetbrains.kotlin.android version.*|org.jetbrains.kotlin.android version "1.9.0" apply false|g' android/settings.gradle
          
          # 4. الحقن للإعدادات المطلوبة
          sed -i '1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }' android/build.gradle
          sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 5. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
