name: Build Flutter APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Build Android Only
        run: |
          # 1. تنظيف شامل للمشروع
          rm -rf android
          
          # 2. إنشاء هيكلية أندرويد فقط وتجنب أي ملفات منصات أخرى
          flutter create . --platforms=android
          flutter pub get
          
          # 3. حقن تعريفات Flutter المطلوبة للمكتبات (مثل app_links)
          # هذا السطر يحل مشكلة Could not get unknown property 'flutter'
          sed -i "1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }" android/build.gradle
          
          # 4. إعداد خصائص الـ Gradle لتوافق المكتبات
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 5. بناء الـ APK بنسخة الإصدار
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
