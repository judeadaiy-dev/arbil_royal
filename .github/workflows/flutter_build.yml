name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          flutter create . --platforms android
          
          # إضافة حل جذري لمشكلة app_links
          echo "subprojects { project.evaluationDependsOn(':app') }" >> android/build.gradle
          
          # بناء التطبيق
          flutter build apk --release --no-tree-shake-icons
          
          # استخراج الـ SHA-1 لـ Firebase
          echo "--- YOUR SHA-1 KEY FOR FIREBASE ---"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androidkey
          echo "-----------------------------------"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
