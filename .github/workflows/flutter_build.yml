name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء مجلد مؤقت وتوليد الأندرويد فيه فقط (بدون التأثير على ملفات مشروعك)
          mkdir temp_android
          cd temp_android
          flutter create . --platforms=android
          cd ..
          
          # 2. نقل ملفات الـ Gradle الضرورية فقط إلى مشروعك (إذا لم تكن موجودة)
          cp -n temp_android/android/build.gradle android/build.gradle || true
          cp -n temp_android/android/app/build.gradle android/app/build.gradle || true
          
          # 3. الحقن الصارم: الآن نحقن الإعدادات في الملفات الموجودة
          # تعريف الـ flutter ext في الملف الرئيسي
          sed -i '1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }' android/build.gradle
          
          # تعريف الـ compileSdkVersion في ملف التطبيق
          sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          
          # ضبط الـ Gradle
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
