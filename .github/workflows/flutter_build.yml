name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          
          # 1. إنشاء المجلد إذا لم يكن موجوداً
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi
          
          # 2. حقن ملف Build.gradle الرئيسي بـ "قوة"
          # هذا الملف هو الذي تحتاجه مكتبة app_links لتعمل بدون خطأ unknown property
          cat <<EOF > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          ext {
              flutter = [
                  compileSdkVersion: 34,
                  minSdkVersion: 21,
                  targetSdkVersion: 34
              ]
          }
          EOF
          
          # 3. التأكد من وجود الخصائص المطلوبة في app/build.gradle
          sed -i '/defaultConfig {/a \        compileSdkVersion 34' android/app/build.gradle
          
          # 4. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
