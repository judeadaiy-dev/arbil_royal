name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build & Compile
        run: |
          flutter pub get
          # الإنشاء الإجباري
          flutter create . --platforms=android
          
          # 1. الحقن الذكي: هذا الأمر يبحث عن أول سطر في build.gradle ويضع التعريفات المطلوبة للمكتبات
          sed -i "1i buildscript { ext { flutter_compileSdkVersion = 34; flutter_minSdkVersion = 21; flutter_targetSdkVersion = 34; } }" android/build.gradle
          
          # 2. حقن الـ android block لضمان رؤية الـ compileSdkVersion من قبل app_links
          # هذا السطر يضيف التعريفات داخل ملف build.gradle الخاص بالتطبيق
          echo "android { compileSdkVersion 34 }" >> android/app/build.gradle
          
          # 3. ضبط Gradle Wrapper
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 4. إعدادات الـ properties
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 5. البناء
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
