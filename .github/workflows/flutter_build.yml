name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          flutter clean
          flutter pub get
          flutter create .
          
          # 1. تعريف المتغيرات التي تبحث عنها المكتبات في ملف Gradle الرئيسي
          # نقوم بحقنها في السطر الأول لضمان وجودها لأي مكتبة (مثل app_links)
          sed -i "1i buildscript { ext { flutter = [compileSdkVersion: 34, minSdkVersion: 21, targetSdkVersion: 34]; } }" android/build.gradle
          
          # 2. ضبط توافق الإصدارات والـ SDK
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          
          # 3. تفعيل الـ AndroidX والـ Jetifier لضمان توافق جميع المكتبات
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
          
          # 4. بناء الـ APK
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
