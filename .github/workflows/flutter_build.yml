name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Generate & Configure Android
        run: |
          # 1. إنشاء المشروع (نستخدم --force لتجاوز أي تعارض)
          flutter create . --platforms=android
          
          # 2. حقن الإعدادات في gradle.properties (أفضل طريقة للتحكم في SDK بدون أخطاء)
          cat <<EOF >> android/gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=21
          flutter.targetSdkVersion=34
          EOF
          
          # 3. تحديث نسخة Kotlin في settings.gradle (لحل مشكلة التوافق)
          # نبحث عن السطر الذي يحتوي على نسخة Kotlin ونستبدله بـ 1.9.22
          sed -i 's/id("org.jetbrains.kotlin.android") version ".*" apply false/id("org.jetbrains.kotlin.android") version "1.9.22" apply false/g' android/settings.gradle
          
          # 4. حقن تصريح الانترنت
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi
          
          echo "Configuration applied successfully."
        
      - name: Build APK
        # استخدام --no-shrink لضمان عدم فشل البناء بسبب المكتبات المتداخلة
        run: flutter build apk --release --no-shrink --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
