name: Build Flutter APK
on: 
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build & Compile
        run: |
          # 1. تنظيف
          flutter clean
          
          # 2. إنشاء الهيكل (بدون استبدال الملفات الموجودة إن وجدت)
          flutter create . --platforms android
          
          # 3. إجبار تحديث الـ Gradle Wrappers ليتوافق مع الإصدارات الحديثة
          cd android && ./gradlew wrapper --gradle-version 8.4 && cd ..
          
          # 4. إصلاح ملف build.gradle الرئيسي (إضافة التعريفات المفقودة)
          echo "buildscript { ext.kotlin_version = '1.9.0' }" > android/build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> android/build.gradle
          
          # 5. تحميل المكتبات
          flutter pub get
          
          # 6. البناء
          flutter build apk --release --no-tree-shake-icons

          
          # 3. إجبار بناء الـ APK بـ Gradle حديث
          flutter build apk --release --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arbil-royal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
