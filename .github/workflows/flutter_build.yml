name: Build SeaChat APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Inject Global Gradle Shield (حل مشكلة تعارض الحزم)
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/init.gradle
          allprojects {
              ext {
                  flutter = [
                      compileSdkVersion: 34,
                      targetSdkVersion: 34,
                      minSdkVersion: 21,
                      compileSdk: 34,
                      targetSdk: 34,
                      minSdk: 21
                  ]
              }
              rootProject.ext {
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  minSdkVersion = 21
                  flutter = [
                      compileSdkVersion: 34,
                      targetSdkVersion: 34,
                      minSdkVersion: 21,
                      compileSdk: 34,
                      targetSdk: 34,
                      minSdk: 21
                  ]
              }
              
              afterEvaluate { project ->
                  if (project.extensions.findByName('android') != null) {
                      def androidObj = project.extensions.getByName('android')
                      try {
                          androidObj.compileSdkVersion = 34
                      } catch (Exception e) {
                          try { androidObj.compileSdk = 34 } catch (Exception ex) {}
                      }
                      try {
                          androidObj.defaultConfig.minSdkVersion = 21
                      } catch (Exception e) {
                          try { androidObj.defaultConfig.minSdk = 21 } catch (Exception ex) {}
                      }
                      try {
                          androidObj.defaultConfig.targetSdkVersion = 34
                      } catch (Exception e) {
                          try { androidObj.defaultConfig.targetSdk = 34 } catch (Exception ex) {}
                      }
                  }
              }
          }
          EOF
          echo "Global Gradle Shield Activated."

      - name: Force Clean Android Structure & Fix SDK Path
        run: |
          # 1. تصفير مجلد الأندرويد لضمان بيئة نظيفة تماماً
          rm -rf android
          
          # 2. توليد قالب أندرويد حديث ونظيف
          flutter create . --platforms=android --template=app
          
          # 3. اصطياد مسار فلاتر وحقنه يدوياً لحل مشكلة (Must provide Flutter source directory)
          FLUTTER_SDK_DIR=$(dirname $(dirname $(which flutter)))
          echo "flutter.sdk=$FLUTTER_SDK_DIR" > android/local.properties
          
          # 4. حقن ملف gradle.properties بالقيم الأساسية لتسريع البناء
          cat <<EOF > android/gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # 5. حقن نسخ الـ SDK بشكل صريح داخل ملف build.gradle
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i 's/compileSdk = .*/compileSdk = 34/g' $APP_GRADLE
            sed -i 's/minSdk = .*/minSdk = 21/g' $APP_GRADLE
            sed -i 's/targetSdk = .*/targetSdk = 34/g' $APP_GRADLE
            
            # احتياطاً للصيغ الأخرى
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' $APP_GRADLE
            sed -i 's/minSdkVersion .*/minSdkVersion 21/g' $APP_GRADLE
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' $APP_GRADLE
          fi

          # 6. ضبط نسخة الكوتلن في ملف الإعدادات
          if [ -f "android/settings.gradle" ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version ".*" apply false/id("org.jetbrains.kotlin.android") version "1.9.22" apply false/g' android/settings.gradle
          fi

          # 7. إضافة تصاريح الإنترنت للـ Manifest ليعمل التطبيق والخرائط بسلاسة
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi

          echo "Android environment completely fixed and secured."

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Mobile-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
