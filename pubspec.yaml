name: arbil_royal_app
description: تطبيق أربيل رويال للعقارات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Supabase + UI
  supabase_flutter: ^2.5.6
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  
  # الخرائط
  google_maps_flutter: ^2.7.0
  
  # تأثيرات Glassmorphism
  # dart:ui موجود تلقائياً ما يحتاج إضافة

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
